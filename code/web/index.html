<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>IAR Security Service [TEST PAGE]</title>
</head>
<body>

<video id="cam0" autoplay playsinline controls></video>
<video id="cam1" autoplay playsinline controls></video>

<script>
async function play(streamPath, videoEl) {
  const pc = new RTCPeerConnection();

  // REQUIRED for Firefox
  pc.addTransceiver("video", { direction: "recvonly" });

  pc.ontrack = e => {
    videoEl.srcObject = e.streams[0];
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  const res = await fetch(`http://localhost:8889/${streamPath}/whep`, {
    method: "POST",
    headers: {
      "Content-Type": "application/sdp"
    },
    body: offer.sdp
  });

  if (!res.ok) {
    throw new Error(`WHEP failed: ${res.status}`);
  }

  const answerSDP = await res.text();

  await pc.setRemoteDescription({
    type: "answer",
    sdp: answerSDP
  });
}

play("cam0", document.getElementById("cam0"));
play("cam1", document.getElementById("cam1"));
</script>

</body>
</html>
