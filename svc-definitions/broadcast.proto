syntax = "proto3";

package iar.rpc;
//import "_models.proto";

// ------------------------------------------------------------------
// Request/Response messages
// ------------------------------------------------------------------

message CloudStorageConfig {
  string provider = 1;       // e.g., "gcloud"
  string bucket_name = 2;    // target bucket
  string object_prefix = 3;  // path prefix
  string credentials_json = 4; // optional, for auth
}

message BroadcastInfo {
  string id = 1;                    // unique broadcast ID
  string url = 2;                   // RTSP / RTSPS / RTSP-TLS URL
  string name = 3;                  // human-readable name
  repeated CloudStorageConfig storage_locations = 4; // multiple cloud targets
  bool recording_enabled = 5;       // start recording immediately
  int32 max_reconnect_attempts = 6; // optional failover behavior
}

message CreateBroadcastRequest {
  BroadcastInfo info = 1;
}

message CreateBroadcastResponse {
  string id = 1; // assigned broadcast ID
  string status = 2;
}

message UpdateBroadcastRequest {
  string id = 1;            // existing broadcast ID
  bool recording_enabled = 2; // toggle recording on/off
  repeated CloudStorageConfig storage_locations = 3; // optional updates
}

message UpdateBroadcastResponse {
  string id = 1;
  string status = 2;
}

message ListBroadcastsRequest {}

message ListBroadcastsResponse {
  repeated BroadcastInfo broadcasts = 1;
}

message SubscribeRequest {
  string id = 1; // broadcast ID to subscribe to
}

message Frame {
  bytes data = 1;          // raw H264 / RTP packet
  int64 timestamp = 2;     // epoch in microseconds
}

message SubscribeResponse {
  oneof payload {
    Frame frame = 1;
    string status = 2;    // e.g., "started", "stopped", "error"
  }
}

// ------------------------------------------------------------------
// The service
// ------------------------------------------------------------------

service BroadcastService {
  // Register a new RTSP feed to be recorded/broadcast
  rpc CreateBroadcast(CreateBroadcastRequest) returns (CreateBroadcastResponse);

  // Update an existing broadcast (e.g., start/stop recording)
  rpc UpdateBroadcast(UpdateBroadcastRequest) returns (UpdateBroadcastResponse);

  // List all broadcasts
  rpc ListBroadcasts(ListBroadcastsRequest) returns (ListBroadcastsResponse);

  // Subscribe to a broadcast feed (server streaming)
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);
}
