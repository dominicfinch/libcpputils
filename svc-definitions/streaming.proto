syntax = "proto3";

package iar.rpc;

import "google/protobuf/timestamp.proto";
import "common.proto";

////////////////////////////////////////////////////////////////////////////////
// Stream Source
////////////////////////////////////////////////////////////////////////////////

message StreamSource {
  string url = 1;                // rtsp:// or rtsps://
  string name = 2;
  string description = 3;
  map<string, string> labels = 4;
}

message VideoSettings {
  uint32 width = 1;
  uint32 height = 2;
  uint32 fps = 3;
  uint32 bitrate_kbps = 4;
}

////////////////////////////////////////////////////////////////////////////////
// Storage
////////////////////////////////////////////////////////////////////////////////

message GCloudStorage {
  string bucket_name = 1;
  string object_prefix = 2;
  string region = 3;
}

message StorageLocation {
  oneof backend {
    GCloudStorage gcloud = 1;
  }
}

////////////////////////////////////////////////////////////////////////////////
// Stream Lifecycle
////////////////////////////////////////////////////////////////////////////////

message CreateStreamRequest {
  StreamSource source = 1;
  VideoSettings settings = 2;
  StorageLocation storage = 3;
}

message CreateStreamResponse {
  StreamId stream_id = 1;
}

message StreamState {
  enum State {
    UNKNOWN = 0;
    STOPPED = 1;
    RUNNING = 2;
    RECORDING = 3;
    ERROR = 4;
  }

  State state = 1;
  string error_message = 2;
}

message StreamInfo {
  StreamId stream_id = 1;
  StreamSource source = 2;
  StreamState state = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message ListStreamsRequest {}
message ListStreamsResponse {
  repeated StreamInfo streams = 1;
}

////////////////////////////////////////////////////////////////////////////////
// Recording
////////////////////////////////////////////////////////////////////////////////

message SetRecordingRequest {
  StreamId stream_id = 1;
  bool enable = 2;
}

message SetRecordingResponse {
  bool recording = 1;
}

////////////////////////////////////////////////////////////////////////////////
// Live Subscription
////////////////////////////////////////////////////////////////////////////////

message SubscribeRequest {
  StreamId stream_id = 1;
}

message StreamChunk {
  bytes data = 1;          // H264 NAL unit or RTP payload
  uint64 timestamp_ms = 2;
  bool keyframe = 3;
}

////////////////////////////////////////////////////////////////////////////////
// Service
////////////////////////////////////////////////////////////////////////////////

service StreamingService {

  rpc CreateStream(CreateStreamRequest) returns (CreateStreamResponse);

  rpc ListStreams(ListStreamsRequest) returns (ListStreamsResponse);

  rpc SetRecording(SetRecordingRequest) returns (SetRecordingResponse);

  rpc Subscribe(SubscribeRequest) returns (stream StreamChunk);
}
