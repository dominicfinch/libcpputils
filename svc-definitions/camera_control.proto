syntax = "proto3";

package iar.rpc;

import "common.proto";

////////////////////////////////////////////////////////////////////////////////
// Camera Metadata
////////////////////////////////////////////////////////////////////////////////

message CameraCapabilities {
  bool ptz = 1;
  bool night_vision = 2;
  bool thermal = 3;
  bool adjustable_bitrate = 4;
  bool adjustable_resolution = 5;
}

message CameraInfo {
  CameraId camera_id = 1;
  string name = 2;
  string manufacturer = 3;
  string model = 4;
  string firmware_version = 5;
  CameraCapabilities capabilities = 6;
}

////////////////////////////////////////////////////////////////////////////////
// PTZ
////////////////////////////////////////////////////////////////////////////////

message PTZCommand {
  CameraId camera_id = 1;
  float pan = 2;   // -1.0 .. 1.0
  float tilt = 3;  // -1.0 .. 1.0
  float zoom = 4;  //  0.0 .. 1.0
}

////////////////////////////////////////////////////////////////////////////////
// Video Configuration
////////////////////////////////////////////////////////////////////////////////

message VideoConfig {
  CameraId camera_id = 1;

  uint32 width = 2;
  uint32 height = 3;
  uint32 fps = 4;
  uint32 bitrate_kbps = 5;

  enum Codec {
    UNKNOWN = 0;
    H264 = 1;
    H265 = 2;
  }

  Codec codec = 6;
}

////////////////////////////////////////////////////////////////////////////////
// Feature Toggles
////////////////////////////////////////////////////////////////////////////////

message FeatureToggle {
  CameraId camera_id = 1;
  bool night_vision = 2;
  bool thermal = 3;
}

////////////////////////////////////////////////////////////////////////////////
// Responses
////////////////////////////////////////////////////////////////////////////////

message CommandResponse {
  bool success = 1;
  string message = 2;
}

////////////////////////////////////////////////////////////////////////////////
// Service
////////////////////////////////////////////////////////////////////////////////

service CameraControlService {

  rpc GetCameraInfo(CameraId)
      returns (CameraInfo);

  rpc SendPTZCommand(PTZCommand)
      returns (CommandResponse);

  rpc UpdateVideoConfig(VideoConfig)
      returns (CommandResponse);

  rpc ToggleFeatures(FeatureToggle)
      returns (CommandResponse);
}
