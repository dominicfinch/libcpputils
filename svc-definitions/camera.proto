syntax = "proto3";
package iar.rpc;

//import "_models.proto";

service CameraControlService {
  rpc Move(MoveRequest) returns (Ack);
  rpc Zoom(ZoomRequest) returns (Ack);
  rpc Stop(StopRequest) returns (Ack);
}

message MoveRequest {
  string camera_id = 1;
  float pan = 2;    // -1.0 to 1.0
  float tilt = 3;   // -1.0 to 1.0
}

message ZoomRequest {
  string camera_id = 1;
  float level = 2;  // 0.0 to 1.0
}

message StopRequest {
  string camera_id = 1;
}

// Note: Duplicated from video.proto - TODO: consolidate.
message Ack {
  bool success = 1;
  string message = 2;
}